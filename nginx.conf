server {
    listen 80;
    server_name _;

    # Canonical domain: redirect www + any other host (e.g. pronovacrypto.tech)
    # to the primary domain https://pronovacrypto.com. TLS is terminated by the
    # upstream nginx-proxy, which passes the original Host header, so $host is the
    # real requested hostname. ACME challenges are served by nginx-proxy and never
    # reach this container, so certificate renewals are unaffected.
    if ($host != "pronovacrypto.com") {
        return 301 https://pronovacrypto.com$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Handle React Router - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
