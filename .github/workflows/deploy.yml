name: Deploy to Production (legacy Vercel — DISABLED)

# The live site is deployed to the Hostinger VPS via .github/workflows/vps-deploy.yml
# (Docker rebuild over SSH). This Vercel pipeline is retained for reference only and
# no longer runs automatically — trigger it manually if a Vercel deploy is ever needed.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm run test -- --coverage --watchAll=false
    
    - name: Build application
      run: npm run build
      env:
        REACT_APP_NETWORK_ID: ${{ secrets.REACT_APP_NETWORK_ID }}
        REACT_APP_TOKEN_ADDRESS: ${{ secrets.REACT_APP_TOKEN_ADDRESS }}
        REACT_APP_PRESALE_ADDRESS: ${{ secrets.REACT_APP_PRESALE_ADDRESS }}
    
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.ORG_ID }}
        vercel-project-id: ${{ secrets.PROJECT_ID }}
        vercel-args: '--prod'