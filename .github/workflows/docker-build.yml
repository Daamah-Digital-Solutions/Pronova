name: Build and Push Docker Images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/pronova-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/pronova-backend

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=https://api.pronovacrypto.com/api
            REACT_APP_WS_URL=https://api.pronovacrypto.com
            REACT_APP_CHAIN_ID=97
            REACT_APP_NETWORK_NAME=BSC Testnet
            REACT_APP_TOKEN_CONTRACT_ADDRESS=0x646937084d5f5Aba37f5e1014E9E7bbE90032dE1
            REACT_APP_PRESALE_CONTRACT_ADDRESS=0x1AE86fB64059723a9e8c3C975D3095Aa5dca05Ba
            REACT_APP_VESTING_CONTRACT_ADDRESS=0x779D973900B2294CA8fe063da39239Cd8bA13a2E
            REACT_APP_NAME=Pronova
            REACT_APP_VERSION=1.0.0

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}
